<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MenteViva</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Quicksand', sans-serif;
}

body {
  background: linear-gradient(180deg, #6c5ce7, #fab1a0);
  height: 100vh;
  overflow: hidden;
}

/* APP CONTAINER */
.app {
  width: 100%;
  max-width: 420px;
  height: 100vh;
  margin: auto;
  position: relative;
  overflow: hidden;
  border-radius: 25px;
}

/* TELAS */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  padding: 25px;
  display: none;
  flex-direction: column;
  justify-content: space-between;
  color: white;
}

.screen.active {
  display: flex;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: 700;
  font-size: 20px;
}

.gear {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* LUA */
.moon {
  position: absolute;
  top: 70px;
  left: 20px;
  font-size: 30px;
}

/* TEXTOS */
.title {
  font-size: 42px;
  font-weight: 700;
  margin-top: 40px;
}

.subtitle {
  font-size: 18px;
  margin-top: 15px;
  opacity: 0.9;
}

/* BONECA */
.character {
  width: 140px;
  margin: 20px auto;
  display: block;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0);}
}

/* INPUT CARD */
.card {
  background: rgba(255,255,255,0.9);
  color: #333;
  padding: 15px;
  border-radius: 25px;
  text-align: center;
  margin: 10px 0;
}

/* BOTÕES */
.btn {
  padding: 15px;
  border-radius: 30px;
  text-align: center;
  font-weight: 600;
  margin-top: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.btn-primary {
  background: linear-gradient(90deg, #6c5ce7, #a29bfe);
}

.btn-outline {
  border: 2px solid white;
}

.btn-light {
  background: white;
  color: #333;
}

/* EMOÇÕES */
.emotions {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}

.emotion {
  padding: 15px;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.emotion:hover {
  background: rgba(255,255,255,0.4);
}

/* ANIMAÇÃO TRANSIÇÃO */
.fade {
  animation: fade 0.4s;
}

@keyframes fade {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<div class="app">

<!-- TELA 1 -->
<div class="screen active fade" id="home">

  <div>
    <div class="header">
      <div class="logo">🍎 MenteViva</div>
      <div class="gear">⚙️</div>
    </div>

    <div class="moon">🌙</div>

    <div class="title">Bem-vindo(a)!</div>
    <div class="subtitle">
      Estamos aqui para cuidar de você,<br>
      nos bons e nos dias difíceis.
    </div>
  </div>

  <div>
    <img class="character" src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">

    <div class="card">
      💬 Como você está se sentindo hoje?
    </div>

    <div class="btn btn-primary" onclick="goTo('feel')">Começar</div>
    <div class="btn btn-outline">Explorar primeiro</div>
    <div class="btn btn-light">👤 Sou psicólogo(a)</div>
  </div>

</div>

<!-- TELA 2 -->
<div class="screen" id="feel">

  <div>
    <div class="title">Como você está?</div>
    <div class="subtitle">Escolha uma emoção</div>
  </div>

  <div class="emotions">
    <div class="emotion" onclick="selectEmotion('feliz')">😊 Feliz</div>
    <div class="emotion" onclick="selectEmotion('triste')">😢 Triste</div>
    <div class="emotion" onclick="selectEmotion('ansioso')">😰 Ansioso</div>
    <div class="emotion" onclick="selectEmotion('calmo')">😌 Calmo</div>
  </div>

  <div class="btn btn-primary" onclick="goTo('result')">Continuar</div>

</div>

<!-- TELA 3 -->
<div class="screen" id="result">

  <div>
    <div class="title">Obrigado 💜</div>
    <div class="subtitle" id="resultText"></div>
  </div>

  <div class="btn btn-primary" onclick="goTo('home')">Voltar</div>

</div>

</div>

<script>
let emotion = "";

function goTo(screen) {
  document.querySelectorAll(".screen").forEach(s => {
    s.classList.remove("active");
  });

  document.getElementById(screen).classList.add("active");
}

function selectEmotion(e) {
  emotion = e;
}

document.querySelector('[onclick="goTo(\'result\')"]').addEventListener("click", () => {
  let text = "";

  if (emotion === "feliz") text = "Que ótimo! Continue assim 😊";
  if (emotion === "triste") text = "Vai passar. Você não está sozinho 💜";
  if (emotion === "ansioso") text = "Respire fundo. Um passo de cada vez 🌿";
  if (emotion === "calmo") text = "Que bom! Aproveite esse momento ✨";

  document.getElementById("resultText").innerText = text;
});
</script>

</body>
</html>

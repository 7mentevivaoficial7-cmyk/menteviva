<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MenteViva</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: url('fundo.png') no-repeat center center fixed;
  background-size: cover;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CELULAR */
.phone {
  width: 360px;
  height: 720px;
  border-radius: 35px;
  overflow: hidden;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(15px);
  color: white;
  position: relative;
}

/* TELAS */
.screen {
  display: none;
  padding: 20px;
  height: 100%;
}

.active {
  display: block;
}

/* TOPO */
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  width: 130px;
}

.back {
  font-size: 22px;
  cursor: pointer;
}

/* TEXTOS */
.center {
  text-align: center;
}

h1 {
  margin-top: 20px;
}

p {
  opacity: 0.9;
}

/* BONECA */
.boneca {
  width: 130px;
  margin: 20px auto;
  display: block;
}

/* BOTÕES */
.btn {
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  border-radius: 30px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.primary {
  background: linear-gradient(90deg,#6a5cff,#9f7bff);
  color: white;
}

.outline {
  background: transparent;
  border: 2px solid white;
  color: white;
}

.light {
  background: #eee;
  color: black;
}

/* CHAT */
.chat-box {
  height: 60%;
  overflow-y: auto;
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 10px;
  margin: 10px 0;
}

.msg {
  padding: 10px;
  border-radius: 15px;
  margin: 5px 0;
}

.user {
  background: #9f7bff;
  text-align: right;
}

.bot {
  background: #eee;
  color: black;
}

.input {
  width: 100%;
  padding: 15px;
  border-radius: 25px;
  border: none;
}
</style>
</head>

<body>

<div class="phone">

<!-- HOME -->
<div class="screen active" id="home">
  <div class="center">
    <img src="logo.png" class="logo">

    <h1>Bem-vindo(a)!</h1>
    <p>Estamos aqui para cuidar de você nos bons e nos dias difíceis</p>

    <img src="boneca.png" class="boneca">

    <button class="btn light" onclick="go('emocao')">
      Como você está se sentindo hoje?
    </button>

    <button class="btn primary" onclick="go('chat')">Começar</button>
    <button class="btn outline" onclick="go('explorar')">Explorar primeiro</button>
    <button class="btn light" onclick="go('profissional')">
      Sou psicólogo(a) ou psiquiatra
    </button>
  </div>
</div>

<!-- EMOÇÕES -->
<div class="screen" id="emocao">
  <div class="top">
    <span class="back" onclick="go('home')">⬅</span>
  </div>

  <h2>Como você está?</h2>

  <button class="btn primary" onclick="go('chat')">😊 Muito bem</button>
  <button class="btn primary" onclick="go('chat')">🙂 Bem</button>
  <button class="btn primary" onclick="go('chat')">😐 Normal</button>
  <button class="btn primary" onclick="go('chat')">😟 Ansioso</button>
  <button class="btn primary" onclick="go('chat')">😢 Triste</button>
</div>

<!-- CHAT -->
<div class="screen" id="chat">
  <div class="top">
    <span class="back" onclick="go('home')">⬅</span>
    <img src="logo.png" class="logo">
  </div>

  <div class="chat-box" id="chatBox"></div>

  <input id="msg" class="input" placeholder="Digite aqui...">
  <button class="btn primary" onclick="sendMsg()">Enviar</button>
</div>

<!-- EXPLORAR -->
<div class="screen" id="explorar">
  <div class="top">
    <span class="back" onclick="go('home')">⬅</span>
    <img src="logo.png" class="logo">
  </div>

  <h2>Explorar</h2>

  <button class="btn primary">Meditação guiada</button>
  <button class="btn primary">Frases motivacionais</button>
</div>

<!-- PROFISSIONAL -->
<div class="screen" id="profissional">
  <div class="top">
    <span class="back" onclick="go('home')">⬅</span>
    <img src="logo.png" class="logo">
  </div>

  <h2>Cadastro Profissional</h2>

  <input class="input" placeholder="Nome completo">
  <input class="input" placeholder="CRM / CRP">
  <input class="input" placeholder="Email">

  <button class="btn primary">Criar perfil (R$7/mês)</button>
</div>

</div>

<script>
function go(tela){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(tela).classList.add('active');
}

function sendMsg(){
  let input = document.getElementById('msg');
  let chat = document.getElementById('chatBox');

  if(input.value === '') return;

  chat.innerHTML += `<div class="msg user">${input.value}</div>`;
  chat.innerHTML += `<div class="msg bot">Estou aqui com você 💜</div>`;

  input.value = '';
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>

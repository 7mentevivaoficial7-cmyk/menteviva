<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MenteViva</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  display:flex;
  justify-content:center;
  background:#000;
}

/* APP CONTAINER */
.app{
  width:100%;
  max-width:420px;
  height:100vh;
  position:relative;
  overflow:hidden;
  color:#fff;
}

/* BACKGROUND */
.bg{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(180deg,#7b6fd6,#ffb384);
  z-index:-2;
}

/* LUA */
.moon{
  position:absolute;
  top:30px;
  left:20px;
  width:60px;
  height:60px;
  background:#fff;
  border-radius:50%;
  box-shadow:-15px 0 0 10px #7b6fd6;
}

/* NUVENS */
.cloud{
  position:absolute;
  background:#ffffff55;
  border-radius:50px;
  filter:blur(10px);
}

.cloud1{width:120px;height:60px;top:100px;left:50px;}
.cloud2{width:150px;height:70px;top:200px;right:30px;}
.cloud3{width:100px;height:50px;bottom:150px;left:40px;}

/* SCREENS */
.screen{
  display:none;
  padding:25px;
  height:100%;
}

.active{
  display:block;
}

/* HEADER */
h1{
  text-align:center;
  margin-top:40px;
  font-size:28px;
}

h2{
  margin:20px 0;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  padding:18px;
  border-radius:20px;
  margin:12px 0;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* BUTTON */
button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:20px;
  margin-top:10px;
  font-size:16px;
  background:linear-gradient(90deg,#ffb384,#ff8c6a);
  color:#fff;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* INPUT */
input, textarea{
  width:100%;
  padding:12px;
  border:none;
  border-radius:15px;
  margin:8px 0;
}

</style>
</head>

<body>

<div class="app">

<div class="bg"></div>
<div class="moon"></div>
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<!-- HOME -->
<div class="screen active" id="home">
  <h1>🌱 MenteViva</h1>

  <div class="card" onclick="go('ajuda')">
    <h3>Encontrar ajuda</h3>
    <p>Profissionais disponíveis</p>
  </div>
</div>

<!-- ESCOLHA -->
<div class="screen" id="ajuda">
  <h2>Escolha</h2>

  <div class="card" onclick="tipo='Psicólogo'; go('cadastro')">
    Psicólogo
  </div>

  <div class="card" onclick="tipo='Psiquiatra'; go('cadastro')">
    Psiquiatra
  </div>
</div>

<!-- CADASTRO -->
<div class="screen" id="cadastro">
  <h2>Cadastro</h2>

  <input id="nome" placeholder="Seu nome">
  <input id="crm" placeholder="CRM / CRP">
  <input type="date">

  <button onclick="proximo()">Continuar</button>
</div>

<!-- PERFIL -->
<div class="screen" id="perfil">
  <h2>Perfil</h2>

  <input type="file">
  <input placeholder="Nome profissional">
  <textarea placeholder="Descrição profissional"></textarea>

  <button onclick="go('pagamento')">Continuar</button>
</div>

<!-- PAGAMENTO -->
<div class="screen" id="pagamento">
  <h2>Ativar Perfil</h2>

  <div class="card">
    <p>Ative seu perfil profissional</p>
    <h3>R$ 7,00</h3>
  </div>

  <button onclick="ativar()">Ativar agora</button>
</div>

<!-- FINAL -->
<div class="screen" id="final">
  <h2>Perfil ativado 🎉</h2>
</div>

</div>

<script>
let tipo="";

function go(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function proximo(){
  let nome=document.getElementById("nome").value;
  let crm=document.getElementById("crm").value;

  if(nome==""||crm==""){
    alert("Preencha tudo!");
    return;
  }

  go("perfil");
}

function ativar(){
  alert("Pagamento de R$7 simulado!");
  go("final");
}
</script>

</body>
</html>

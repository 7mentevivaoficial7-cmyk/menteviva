<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mente Viva</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background: linear-gradient(180deg,#1c2338 0%,#5f6c8f 50%,#c9cfdb 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family: 'Nunito', sans-serif;
}

.app {
  width:360px;
  height:720px;
  border-radius:40px;
  overflow:hidden;
  position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.screen {
  position:absolute;
  width:100%;
  height:100%;
  display:none;
}

.active {
  display:block;
}

/* IMAGEM GRANDE SENDO RECORTADA */
.crop {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* POSIÇÕES (AJUSTADAS PRA SUA IMG) */
.top-left { object-position: left top; }
.top-right { object-position: right top; }
.bottom-left { object-position: left bottom; }
.bottom-right { object-position: right bottom; }

.click {
  position:absolute;
  background:transparent;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<!-- INÍCIO -->
<div id="inicio" class="screen active">
  <img src="tela_inicial.png" class="crop">

  <button class="click"
    style="bottom:140px; left:40px; width:280px; height:60px;"
    onclick="go('chat')"></button>
</div>

<!-- CHAT (parte cima esquerda da telas.png) -->
<div id="chat" class="screen">
  <img src="telas.png" class="crop top-left">

  <button class="click"
    style="top:30px; left:15px; width:50px; height:50px;"
    onclick="go('inicio')"></button>
</div>

<!-- EXPLORAR (cima direita) -->
<div id="explorar" class="screen">
  <img src="telas.png" class="crop top-right">

  <button class="click"
    style="top:250px; left:30px; width:300px; height:120px;"
    onclick="go('lista')"></button>

  <button class="click"
    style="top:400px; left:30px; width:300px; height:120px;"
    onclick="alert('Frases em breve')"></button>

  <button class="click"
    style="top:30px; left:15px; width:50px; height:50px;"
    onclick="go('inicio')"></button>
</div>

<!-- EMOÇÕES (baixo esquerda) -->
<div id="emocoes" class="screen">
  <img src="telas.png" class="crop bottom-left">

  <button class="click"
    style="top:250px; left:20px; width:320px; height:300px;"
    onclick="go('chat')"></button>

  <button class="click"
    style="top:30px; left:15px; width:50px; height:50px;"
    onclick="go('inicio')"></button>
</div>

<!-- PERFIL (baixo direita) -->
<div id="perfil" class="screen">
  <img src="telas.png" class="crop bottom-right">

  <button class="click"
    style="bottom:80px; left:40px; width:280px; height:60px;"
    onclick="alert('Perfil salvo')"></button>

  <button class="click"
    style="top:30px; left:15px; width:50px; height:50px;"
    onclick="go('inicio')"></button>
</div>

<!-- LISTA (usa imagem separada se quiser) -->
<div id="lista" class="screen">
  <img src="lista_meditacoes.png" class="crop">

  <button class="click"
    style="top:30px; left:15px; width:50px; height:50px;"
    onclick="go('explorar')"></button>
</div>

</div>

<script>
function go(tela){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(tela).classList.add('active');
}
</script>

</body>
</html>
